<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphite Explorer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <link rel="stylesheet" href="/web/style.css">
</head>
<body>
    <div id="header">
        <h1>Graphite Explorer</h1>
        <div id="stats"></div>
    </div>
    <div id="toolbar">
        <input type="text" id="search" placeholder="Search: class pattern or node ID...">
        <select id="search-type">
            <option value="call-sites">Call Sites</option>
            <option value="methods">Methods</option>
            <option value="nodes">Nodes</option>
        </select>
        <button id="search-btn">Search</button>
        <span id="result-count"></span>
    </div>
    <div id="main">
        <div id="graph-container">
            <div id="cy"></div>
        </div>
        <div id="detail-panel">
            <h3>Details</h3>
            <div id="detail-content">
                <p class="hint">Click a node to see details</p>
            </div>
        </div>
    </div>
    <div id="results-panel" style="display:none">
        <h3>Search Results <button id="close-results">X</button></h3>
        <div id="results-list"></div>
    </div>
    <script src="/web/app.js"></script>
</body>
</html>
