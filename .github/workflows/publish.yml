name: Publish to Sonatype Central

on:
  push:
    tags:
      - 'v*'
  repository_dispatch:
    types: [publish]

jobs:
  publish:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    if: github.repository_owner == 'johnsonlee'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Publish to Sonatype Central
      run: |
        VERSION=${GITHUB_REF/refs\/tags\/v/}
        echo "Publishing version ${VERSION} ..."
        echo "Create GPG private key"
        echo $GPG_KEY_ARMOR | base64 --decode > ${GITHUB_WORKSPACE}/secring.gpg
        ./gradlew clean publishMavenJavaPublicationToSonatypeRepository closeAndReleaseSonatypeStagingRepository -S --no-daemon \
            -Pversion=${VERSION} \
            -POSSRH_USERNAME=${OSSRH_USERNAME} \
            -POSSRH_PASSWORD=${OSSRH_PASSWORD} \
            -POSSRH_PACKAGE_GROUP=${OSSRH_PACKAGE_GROUP} \
            -Psigning.keyId=${GPG_KEY_ID} \
            -Psigning.password=${GPG_PASSPHRASE} \
            -Psigning.secretKeyRingFile=${GITHUB_WORKSPACE}/secring.gpg
      env:
        JAVA_OPTS: -Xmx8g -XX:MetaspaceSize=512m -Dfile.encoding=UTF-8
        JVM_OPTS: -Xmx8g -XX:MetaspaceSize=512m -Dfile.encoding=UTF-8
        GPG_KEY_ARMOR: ${{ secrets.GPG_KEY_ARMOR }}
        GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
        OSSRH_PACKAGE_GROUP: ${{ secrets.OSSRH_PACKAGE_GROUP }}

    - name: Build CLI shadow JARs
      run: |
        VERSION=${GITHUB_REF/refs\/tags\/v/}
        ./gradlew :graphite-query:shadowJar :graphite-explore:shadowJar --no-daemon -Pversion=${VERSION}
        mkdir -p release-assets
        cp graphite-query/build/libs/graphite-query.jar release-assets/graphite-query.jar
        cp graphite-explore/build/libs/graphite-explore.jar release-assets/graphite-explore.jar

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        generate_release_notes: true
        files: release-assets/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: johnsonlee
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract Docker metadata
      id: docker_meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/johnsonlee/graphite-explore
          docker.io/johnsonlee/graphite-explore
        tags: |
          type=semver,pattern={{version}},value=${{ github.ref_name }}
          type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
          type=semver,pattern={{major}},value=${{ github.ref_name }}
          type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
        labels: |
          org.opencontainers.image.title=graphite-explore
          org.opencontainers.image.description=Interactive web visualization for Graphite static analysis graphs
          org.opencontainers.image.source=https://github.com/johnsonlee/graphite
          org.opencontainers.image.licenses=Apache-2.0

    - name: Build and push graphite-explore image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: graphite-explore/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.docker_meta.outputs.tags }}
        labels: ${{ steps.docker_meta.outputs.labels }}
        build-args: |
          VERSION=${{ github.ref_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Update Homebrew tap
      env:
        HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      run: |
        if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
          echo "HOMEBREW_TAP_TOKEN not set — skipping tap update"
          exit 0
        fi

        VERSION=${GITHUB_REF/refs\/tags\/v/}
        QUERY_SHA=$(sha256sum release-assets/graphite-query.jar | awk '{print $1}')
        EXPLORE_SHA=$(sha256sum release-assets/graphite-explore.jar | awk '{print $1}')

        git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/johnsonlee/homebrew-tap.git" tap
        cd tap
        mkdir -p Formula

        # remove legacy file if present
        rm -f Formula/graphite-query.rb

        cat > Formula/graphite.rb <<RUBY
        class Graphite < Formula
          desc "Query and inspect Graphite static analysis graphs"
          homepage "https://github.com/johnsonlee/graphite"
          version "${VERSION}"
          url "https://github.com/johnsonlee/graphite/releases/download/v#{version}/graphite-query.jar"
          sha256 "${QUERY_SHA}"
          license "Apache-2.0"

          depends_on "openjdk@17"

          def install
            libexec.install "graphite-query.jar"
            (bin/"graphite").write <<~EOS
              #!/bin/bash
              exec "#{Formula["openjdk@17"].opt_bin}/java" \${GRAPHITE_OPTS:--Xmx8g} -jar "#{libexec}/graphite-query.jar" "\$@"
            EOS
          end

          test do
            assert_match "Usage", shell_output("#{bin}/graphite --help")
          end
        end
        RUBY

        cat > Formula/graphite-explore.rb <<RUBY
        class GraphiteExplore < Formula
          desc "Interactive web visualization for Graphite static analysis graphs"
          homepage "https://github.com/johnsonlee/graphite"
          version "${VERSION}"
          url "https://github.com/johnsonlee/graphite/releases/download/v#{version}/graphite-explore.jar"
          sha256 "${EXPLORE_SHA}"
          license "Apache-2.0"

          depends_on "openjdk@17"

          def install
            libexec.install "graphite-explore.jar"
            (bin/"graphite-explore").write <<~EOS
              #!/bin/bash
              exec "#{Formula["openjdk@17"].opt_bin}/java" \${GRAPHITE_OPTS:--Xmx8g} -jar "#{libexec}/graphite-explore.jar" "\$@"
            EOS
          end

          test do
            assert_match "Usage", shell_output("#{bin}/graphite-explore --help")
          end
        end
        RUBY

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/
        if ! git diff --cached --quiet; then
          git commit -m "graphite ${VERSION}"
          git push origin main
        fi