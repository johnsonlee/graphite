name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'
  repository_dispatch:
    types: [publish]

jobs:
  publish:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    if: github.repository_owner == 'johnsonlee'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Publish to GitHub Packages
      run: |
        VERSION=${GITHUB_REF/refs\/tags\/v/}
        echo "Publishing version ${VERSION} ..."
        ./gradlew clean publishAllPublicationsToGitHubPackagesRepository -S --no-daemon \
            -Pversion=${VERSION}
      env:
        JAVA_OPTS: -Xmx4g -XX:MetaspaceSize=512m -Dfile.encoding=UTF-8
        JVM_OPTS: -Xmx4g -XX:MetaspaceSize=512m -Dfile.encoding=UTF-8
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build CLI shadow JARs
      run: |
        VERSION=${GITHUB_REF/refs\/tags\/v/}
        ./gradlew :graphite-query:shadowJar :graphite-explore:shadowJar --no-daemon -Pversion=${VERSION}
        mkdir -p release-assets
        cp graphite-query/build/libs/graphite-query.jar release-assets/graphite-query.jar
        cp graphite-explore/build/libs/graphite-explore.jar release-assets/graphite-explore.jar

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        generate_release_notes: true
        files: release-assets/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Homebrew tap
      if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
      run: |
        VERSION=${GITHUB_REF/refs\/tags\/v/}
        QUERY_SHA=$(sha256sum release-assets/graphite-query.jar | awk '{print $1}')
        EXPLORE_SHA=$(sha256sum release-assets/graphite-explore.jar | awk '{print $1}')

        git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/johnsonlee/homebrew-tap.git" tap
        cd tap

        python3 - <<PYEOF
        import re
        for (name, sha) in [("graphite-query", "${QUERY_SHA}"), ("graphite-explore", "${EXPLORE_SHA}")]:
            path = f"Formula/{name}.rb"
            with open(path) as f:
                content = f.read()
            content = re.sub(r'version ".*?"', f'version "${VERSION}"', content, count=1)
            content = re.sub(r'sha256 ".*?"', f'sha256 "{sha}"', content, count=1)
            with open(path, "w") as f:
                f.write(content)
        PYEOF

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/
        if ! git diff --cached --quiet; then
          git commit -m "graphite ${VERSION}"
          git push origin main
        fi
      env:
        HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}